# Overlay d'observabilité (OBS-01/02/03) — profil opt-in « monitoring ».
# PAS de `name:` ici (à dessein) : l'overlay HÉRITE du nom de projet du fichier de base avec
# lequel il est combiné (clé `name:` du DERNIER fichier `-f` l'emporte). Le pin nuirait à la
# réutilisabilité — il rattacherait par erreur l'overlay à un projet `loyertracker` distinct du
# projet `loyertracker-staging`, créant une stack en double et un conflit de ports (cf. nginx 18080).
# Réutilisable : se combine avec le compose de base (dev → projet `loyertracker`) OU avec celui de
# staging (→ projet `loyertracker-staging`), en rejoignant le même projet/réseau (`loyertracker-net`)
# que la stack applicative :
#   docker compose -f docker-compose.yml          -f docker-compose.monitoring.yml --profile monitoring up -d
#   docker compose -f docker-compose.staging.yml  -f docker-compose.monitoring.yml --profile monitoring up -d
# Pré-requis : renseigner ALERTMANAGER_WEBHOOK_URL dans .env (secret de notification, jamais versionné).
# Ports NON publiés (réseau interne), sauf le Pushgateway lié à la loopback pour le cron de l'hôte.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks: [loyertracker-net]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: [monitoring]
    # Alertmanager n'étend PAS les variables d'environnement dans sa conf (aucun flag
    # `--config.expand-environment-variables` ; contrairement à Prometheus). Le secret de
    # notification est donc matérialisé au démarrage depuis .env vers un fichier (writable
    # /tmp), lu par `url_file` dans alertmanager.yml. Le secret ne quitte jamais .env et n'est
    # ni versionné ni inscrit dans la conf. `$$` échappe l'interpolation Compose (expansion par
    # le shell du conteneur, depuis l'environnement injecté ci-dessous).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        printf '%s' "$${ALERTMANAGER_WEBHOOK_URL:?ALERTMANAGER_WEBHOOK_URL requis dans .env}" > /tmp/webhook_url
        && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [loyertracker-net]
    restart: unless-stopped

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    profiles: [monitoring]
    command: ["--config.file=/etc/blackbox/blackbox.yml"]
    volumes:
      - ./infra/monitoring/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks: [loyertracker-net]
    restart: unless-stopped

  # Reçoit le heartbeat des jobs cron de l'hôte (sauvegarde PostgreSQL).
  # Exposé sur la loopback uniquement (127.0.0.1) : joignable par le cron de l'hôte,
  # jamais public. Scrapé en interne par Prometheus via le réseau Docker.
  pushgateway:
    image: prom/pushgateway:v1.9.0
    profiles: [monitoring]
    ports:
      - "127.0.0.1:9091:9091"
    networks: [loyertracker-net]
    restart: unless-stopped

networks:
  loyertracker-net:
    driver: bridge

volumes:
  prometheus-data:
