# blackbox-exporter — sondes des composants non instrumentés directement (DB, Keycloak).
modules:
  # Sonde HTTP : 200 attendu (health Keycloak).
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200]
      method: GET
      preferred_ip_protocol: ip4

  # Sonde TCP : établissement de connexion (PostgreSQL).
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
