# Alertmanager — routage et notification des alertes critiques (OBS-02).
# Les variables ${...} sont résolues au démarrage via le flag
# `--config.expand-environment-variables` (cf. docker-compose.yml, service alertmanager).
# Le secret de notification (URL webhook avec jeton) est injecté par .env, jamais versionné.
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # Les alertes critiques sont notifiées plus fréquemment.
  routes:
    - matchers:
        - severity = "critical"
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL}"
        send_resolved: true
