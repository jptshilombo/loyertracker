# Alertmanager — routage et notification des alertes critiques (OBS-02).
# Notification via le receiver NATIF Discord (`discord_configs`) : un webhook Discord brut rejette
# le JSON natif d'Alertmanager, ce receiver émet donc un payload formaté pour Discord.
# Le secret de notification (URL du webhook Discord, avec jeton) n'est PAS en clair ici : il est lu via
# `webhook_url_file` depuis /tmp/webhook_url, écrit au démarrage depuis .env par l'entrypoint du service
# (cf. docker-compose.monitoring.yml). Le secret reste dans .env, jamais versionné.
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # Les alertes critiques sont notifiées plus fréquemment.
  routes:
    - matchers:
        - severity = "critical"
      repeat_interval: 1h

receivers:
  - name: default
    discord_configs:
      # URL du webhook Discord lue depuis un fichier (secret hors dépôt et hors conf) — cf. en-tête.
      - webhook_url_file: /tmp/webhook_url
        send_resolved: true
