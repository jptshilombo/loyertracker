# Prometheus — observabilité LoyerTracker (OBS-01/02/03, lot cap production PR 1).
# Profil Compose « monitoring » (opt-in) ; non publié sur l'hôte (réseau interne uniquement).
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Prometheus lui-même (sanity).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API LoyerTracker — métriques Micrometer (up, http_server_requests, hikaricp, jobs planifiés).
  - job_name: loyertracker-api
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ["api:8080"]

  # Pushgateway — heartbeat des jobs cron de l'hôte (sauvegarde PostgreSQL).
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # Sonde TCP de PostgreSQL via blackbox-exporter (DB inaccessible).
  - job_name: blackbox-postgres
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["postgres:5432"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Sonde HTTP du health Keycloak via blackbox-exporter (service d'identité indisponible).
  - job_name: blackbox-keycloak
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://keycloak:8080/auth/health/ready"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
