worker_processes auto;

# Exécution non-root (durcissement, lot Production Readiness 2) : le PID et les répertoires
# temporaires sont déplacés vers /tmp (writable par l'utilisateur nginx), et les ports d'écoute
# sont non privilégiés (8080/8443) — remappés 80/443 côté Compose.
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Répertoires temporaires accessibles sans privilèges (cf. pid ci-dessus).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;               # masque la version Nginx (durcissement)
    client_max_body_size 10m;             # limite la taille des requêtes

    # Logs d'accès au format JSON (observabilité — Étape 09)
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"body_bytes":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream":"$upstream_addr"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json image/svg+xml;

    upstream api {
        server api:8080;
    }
    upstream keycloak {
        server keycloak:8080;
    }

    # ----- Redirection HTTP -> HTTPS (port non privilégié, publié en 80 par Compose) -----
    server {
        listen      8080;
        server_name _;

        # Sonde de vivacité du conteneur web (healthcheck Compose, lot Production Readiness 4) :
        # répond 200 en clair sans rediriger, aucune donnée sensible. access_log coupé.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Tout le reste bascule en HTTPS (point d'entrée unique, ADR-08).
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- Point d'entrée unique HTTPS (ADR-08 ; port non privilégié, publié en 443 par Compose) -----
    server {
        listen              8443 ssl;
        http2               on;
        server_name         localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # En-têtes de sécurité hérités par /api et /auth (locations sans add_header)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ----- Métriques Prometheus : INTERNES uniquement (lot Production Readiness 4) -----
        # L'API expose /api/actuator/prometheus pour un scraper sur le réseau Docker (api:8080).
        # Au point d'entrée public, on le bloque (404, sans révéler l'existence de l'endpoint).
        # Match exact : précède le préfixe /api/ ci-dessous.
        location = /api/actuator/prometheus {
            return 404;
        }

        # ----- API backend (Bearer JWT) -----
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- Keycloak : console d'admin + endpoints OIDC -----
        # Keycloak gère ses propres en-têtes (CSP, X-Frame-Options) : on ne les surcharge pas ici.
        location /auth/ {
            proxy_pass         http://keycloak;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- SPA Angular (assets statiques + fallback routing) -----
        location / {
            root      /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # add_header dans une location n'hérite PAS du niveau server : on répète les en-têtes sûrs
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff" always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
            add_header X-Frame-Options            "DENY" always;
            # CSP de base — à durcir en Étape 07/10 (US-72) selon les besoins réels de la SPA.
            add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;
        }
    }
}
