worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;               # masque la version Nginx (durcissement)
    client_max_body_size 10m;             # limite la taille des requêtes

    # Logs d'accès au format JSON (observabilité — Étape 09)
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"body_bytes":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream":"$upstream_addr"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json image/svg+xml;

    upstream api {
        server api:8080;
    }
    upstream keycloak {
        server keycloak:8080;
    }

    # ----- Redirection HTTP -> HTTPS -----
    server {
        listen      80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----- Point d'entrée unique HTTPS (ADR-08) -----
    server {
        listen              443 ssl;
        http2               on;
        server_name         localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # En-têtes de sécurité hérités par /api et /auth (locations sans add_header)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ----- API backend (Bearer JWT) -----
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- Keycloak : console d'admin + endpoints OIDC -----
        # Keycloak gère ses propres en-têtes (CSP, X-Frame-Options) : on ne les surcharge pas ici.
        location /auth/ {
            proxy_pass         http://keycloak;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- SPA Angular (assets statiques + fallback routing) -----
        location / {
            root      /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # add_header dans une location n'hérite PAS du niveau server : on répète les en-têtes sûrs
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff" always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
            add_header X-Frame-Options            "DENY" always;
            # CSP de base — à durcir en Étape 07/10 (US-72) selon les besoins réels de la SPA.
            add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;
        }
    }
}
