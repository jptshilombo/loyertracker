name: loyertracker

# Stack de développement — point d'entrée unique Nginx (443).
# api, keycloak et postgres ne sont PAS publiés sur l'hôte (réseau interne). Cf. DAT ADR-08.

services:
  postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0@sha256:f8ade94c1d0ad2f2fa7734a455fee5392764f402c43ca35e9af6bf63a2541dc9
    command: ["start-dev", "--import-realm", "--http-relative-path=/auth"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Derrière le reverse proxy Nginx (terminaison TLS) — cf. ADR-08
      # KC 24 (hostname v1) : KC_HOSTNAME = hôte seul (pas une URL). Le scheme https
      # + le chemin relatif /auth donnent l'issuer https://localhost/auth/realms/loyertracker.
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      # Realm versionné (sans secret) importé au démarrage. Mont du seul fichier
      # JSON : le répertoire d'import ne doit contenir que des realms.
      - ./infra/keycloak/realm-loyertracker.json:/opt/keycloak/data/import/realm-loyertracker.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [loyertracker-net]
    healthcheck:
      # L'image Keycloak (UBI minimal) n'a ni curl ni wget : on sonde /health/ready via bash/dev-tcp.
      # KC 24 sert l'endpoint santé sur le port HTTP principal (8080) sous le chemin relatif /auth
      # (le port de management dédié 9000 n'est par défaut qu'à partir de KC 25).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # One-shot : injecte le mot de passe du compte de test DEV (depuis .env) après l'import
  # du realm. Aucun secret n'est ainsi versionné dans realm-loyertracker.json. Idempotent.
  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0@sha256:f8ade94c1d0ad2f2fa7734a455fee5392764f402c43ca35e9af6bf63a2541dc9
    entrypoint: ["bash", "/opt/keycloak/data/bootstrap-test-account.sh"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_TEST_BAILLEUR_PASSWORD: ${KEYCLOAK_TEST_BAILLEUR_PASSWORD}
      # Secret injecté post-import dans le client Admin API loyertracker-admin (R6).
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
    volumes:
      - ./infra/keycloak/bootstrap-test-account.sh:/opt/keycloak/data/bootstrap-test-account.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks: [loyertracker-net]
    restart: "no"

  api:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      # Runtime : rôle applicatif à privilèges minimaux (NOSUPERUSER/NOBYPASSRLS) → la RLS FORCE
      # s'applique réellement (ADR-01). Créé par la migration V5.
      DB_USER: ${DB_APP_USER}
      DB_PASSWORD: ${DB_APP_PASSWORD}
      # Migrations : rôle administrateur (propriétaire) distinct, capable de DDL et CREATE ROLE.
      DB_ADMIN_USER: ${POSTGRES_USER}
      DB_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      DB_BATCH_USER: ${DB_BATCH_USER}
      DB_BATCH_PASSWORD: ${DB_BATCH_PASSWORD}
      # iss validé contre l'URL publique ; JWKS récupéré en interne (cf. application.yml)
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      # Admin API Keycloak (US-12, ADR-10, R6) : client confidentiel à service account.
      # base-url inclut le chemin relatif /auth (KC démarré avec --http-relative-path=/auth).
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_API_CLIENT_ID: ${KEYCLOAK_API_CLIENT_ID}
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-https://localhost}
      APP_INVITATION_BASE_URL: ${APP_INVITATION_BASE_URL:-https://localhost}
      # Quittances certifiées (EP-14, ADR-15 D3) : secret HMAC des tokens de vérification QR.
      # Vide en dev = secret éphémère (WARN au démarrage) ; EXIGÉ au préflight Staging/Production
      # (checklist Gate — sans lui les QR imprimés ne survivent pas à un redémarrage).
      QUITTANCE_HMAC_SECRET: ${QUITTANCE_HMAC_SECRET:-}
      QUITTANCE_TOKEN_KID: ${QUITTANCE_TOKEN_KID:-1}
      QUITTANCE_VERIFY_BASE_URL: ${QUITTANCE_VERIFY_BASE_URL:-https://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  nginx:
    # Image web du projet (SPA Angular buildée + Nginx non-root, lot Production Readiness 2).
    # Build depuis la racine du dépôt (ADR-08) ; en staging, la même image est tirée du
    # registry GHCR par tag immuable (cf. docker-compose.staging.yml).
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      # Remap ports privilégiés hôte → ports non privilégiés du conteneur (Nginx non-root).
      - "80:8080"
      - "443:8443"
    volumes:
      # Conf montée en dev pour itérer sans rebuild (même fichier que celui embarqué à l'image).
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Certificats lisibles par l'uid 101 (utilisateur nginx du conteneur non-root).
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    healthcheck:
      # Sonde la vivacité Nginx via /healthz (200, port HTTP interne) — cf. nginx.conf.
      # 127.0.0.1 (et non localhost) : Nginx n'écoute qu'en IPv4 (`listen 8080;`) ; or sur
      # certains hôtes /etc/hosts résout localhost en ::1 d'abord et le wget busybox (alpine)
      # tente l'IPv6 → connection refused. L'IPv4 loopback explicite est déterministe.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# Observabilité (OBS-01/02/03) : les services monitoring (Prometheus, Alertmanager,
# blackbox-exporter, Pushgateway) sont dans l'overlay réutilisable `docker-compose.monitoring.yml`,
# combinable avec ce fichier (dev) OU avec `docker-compose.staging.yml` (staging) :
#   docker compose -f docker-compose.yml          -f docker-compose.monitoring.yml --profile monitoring up -d
#   docker compose -f docker-compose.staging.yml  -f docker-compose.monitoring.yml --profile monitoring up -d

networks:
  loyertracker-net:
    driver: bridge

volumes:
  postgres-data:
