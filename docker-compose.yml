name: loyertracker

# Stack de développement — point d'entrée unique Nginx (443).
# api, keycloak et postgres ne sont PAS publiés sur l'hôte (réseau interne). Cf. DAT ADR-08.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm", "--http-relative-path=/auth"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Derrière le reverse proxy Nginx (terminaison TLS) — cf. ADR-08
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://localhost/auth
      KC_HOSTNAME_ADMIN: https://localhost/auth
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [loyertracker-net]
    healthcheck:
      # L'image Keycloak (UBI minimal) n'a ni curl ni wget : on teste le port de management 9000 via bash/dev-tcp.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_BATCH_USER: ${DB_BATCH_USER}
      DB_BATCH_PASSWORD: ${DB_BATCH_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - ./infra/nginx/html:/usr/share/nginx/html:ro   # SPA placeholder (remplacé par le build Angular en prod)
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    restart: unless-stopped

networks:
  loyertracker-net:
    driver: bridge

volumes:
  postgres-data:
