name: loyertracker

# Overrides production : à utiliser avec
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Différences clés : images consommées depuis GHCR par tag IMMUABLE `sha-<8>` (jamais `latest`,
# jamais buildées localement — ADR-08, Environment Promotion Model), Keycloak en mode production
# (start --optimized), volumes nommés persistants, aucun montage de code source.
#
# Comme en staging, définir LOYERTRACKER_TAG sur un tag immuable :
#   LOYERTRACKER_TAG=sha-xxxxxxxx docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always

  keycloak:
    # Mode production réel (`start`, SANS `--optimized`) : HTTPS/hostname gérés en amont (Nginx).
    # `--optimized` supposerait une image pré-`kc.sh build` pour Postgres ; or l'image GHCR officielle
    # est buildée par défaut sur H2 → sous `--optimized`, KC IGNORE KC_DB/KC_HEALTH_ENABLED/
    # KC_HTTP_RELATIVE_PATH au runtime et retombe sur H2 (échec JDBC observé au go-live Gate 10).
    # Sans `--optimized`, `start` ré-augmente au démarrage en honorant ces options build-time.
    command: ["start", "--import-realm", "--http-relative-path=/auth"]
    environment:
      # Le compose de base fige KC_HOSTNAME=localhost (dev). En prod : hostname public réel, sinon
      # l'issuer serait https://localhost/... et l'API rejetterait les tokens (iss ≠ ISSUER_URI).
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
    volumes:
      # Realm production : sans bailleur-test@test.local (sécurité — DT-05 / R-03 audit CGPA v5.4.1).
      # Remplace le montage du fichier de base (realm-loyertracker.json qui contient le compte de test).
      # Impact : uniquement en cas de down -v + redémarrage à froid (Keycloak ignore --import-realm
      # si le realm existe déjà en base).
      - ./infra/keycloak/realm-loyertracker-production.json:/opt/keycloak/data/import/realm-loyertracker.json:ro
    restart: always

  api:
    # GHCR, tag immuable — jamais `latest`, jamais de build local en production (parité staging).
    image: ${REGISTRY_BASE:-ghcr.io/jptshilombo}/loyertracker-api:${LOYERTRACKER_TAG:?Définir LOYERTRACKER_TAG=sha-xxxxxxxx (tag immuable, jamais latest)}
    build: !reset null
    restart: always

  nginx:
    # Image web (SPA Angular intégrée à Nginx) tirée de GHCR par tag immuable.
    image: ${REGISTRY_BASE:-ghcr.io/jptshilombo}/loyertracker-web:${LOYERTRACKER_TAG:?Définir LOYERTRACKER_TAG=sha-xxxxxxxx (tag immuable, jamais latest)}
    build: !reset null
    # Ports hôte paramétrables (parité staging, lot Production Readiness 4b) pour cohabiter avec un
    # reverse-proxy mutualisé qui termine le TLS public (ex. Nginx hôte + certbot sur 80/443 →
    # conteneur sur 18080/18443). `!override` REMPLACE la liste de base (sinon Compose la concatène
    # et 80/443 subsisteraient, entrant en conflit avec le proxy hôte).
    ports: !override
      - "${WEB_HTTP_PORT:-80}:8080"
      - "${WEB_HTTPS_PORT:-443}:8443"
    volumes:
      # On ne monte plus le code : seuls la conf et les certificats sont injectés.
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    restart: always

volumes:
  postgres-data:
  keycloak-data:
