name: loyertracker

# Overrides production : à utiliser avec
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Différences clés : images buildées (SPA Angular intégrée à Nginx), Keycloak en mode
# production (start), volumes nommés persistants, aucun montage de code source.

services:
  postgres:
    restart: always

  keycloak:
    # Mode production : nécessite HTTPS géré en amont (Nginx) et hostname fixe.
    command: ["start", "--import-realm", "--http-relative-path=/auth", "--optimized"]
    restart: always

  api:
    image: loyertracker/api:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    restart: always

  nginx:
    # En production, Nginx est buildé avec les assets Angular (dist) intégrés (cf. Étape 07).
    image: loyertracker/web:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
    volumes:
      # On ne monte plus le code : seuls la conf et les certificats sont injectés.
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    restart: always

volumes:
  postgres-data:
  keycloak-data:
