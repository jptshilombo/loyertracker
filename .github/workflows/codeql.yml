name: CodeQL

# SAST (réserve R1, Gate 6). Analyse statique de sécurité du backend Java et du frontend
# TypeScript. Les alertes remontent dans l'onglet Security ; l'application bloquante des PR se
# configure via la protection de branche (« Require code scanning results »).
# push restreint à `main` (validation post-merge) : sur une branche de feature avec PR ouverte,
# push+pull_request déclenchaient sinon deux runs du même commit, l'un annulé par
# cancel-in-progress — un check requis "cancelled" bloque durablement le merge même avec
# enforce_admins (constaté sur ci.yml, PR #132, 2026-07-01) ; même correction appliquée ici.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # hebdomadaire (lundi 03:00 UTC) : capte les nouvelles règles CodeQL

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyse CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["java-kotlin", "javascript-typescript"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          # build-mode none : extraction depuis les sources, sans compilation (supporté pour Java
          # et TS). Évite de dépendre du build Maven/npm ici — la compilation est déjà gatée par ci.yml.
          build-mode: none
          queries: security-extended

      - name: Analyser
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
