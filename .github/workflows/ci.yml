name: CI

# Pipeline d'intégration continue (US-04) : build + tests + scans de sécurité + packaging
# Docker. Déclenché sur chaque push et chaque pull request.
on:
  push:
    branches: ["**"]
  pull_request:

# Annule les exécutions obsolètes d'une même branche/PR (économie de runners).
# Groupé par SHA (pas par ref) : un push sur une branche avec PR ouverte déclenche à la fois
# `push` (ref=refs/heads/...) et `pull_request` (ref=refs/pull/N/merge) pour le même commit ;
# grouper par ref seul ne déduplique pas ces deux déclenchements, ce qui fait tourner deux
# analyses SonarQube simultanées du même commit et l'une des deux échoue sur la validation de
# concurrence interne de SonarQube (constaté PR #131, 2026-07-01).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------------------
  # Backend : compilation, tests (dont migration Flyway via Testcontainers) + couverture.
  # ----------------------------------------------------------------------------------
  backend:
    name: Backend (build + tests + couverture)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # historique complet : SonarQube a besoin du blame Git pour le code nouveau

      - name: Setup JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvn verify : compile + tests (SchemaMigrationTest démarre un PostgreSQL via Docker,
      # disponible nativement sur les runners GitHub) + rapport et quality gate JaCoCo.
      - name: Build, tests et couverture
        run: mvn -B verify

      # Analyse statique SonarQube — lit le jacoco.xml déjà produit par mvn verify.
      # sonar.qualitygate.wait=true (pom.xml) : bloquant si le gate SonarQube échoue.
      - name: Analyse SonarQube
        run: mvn -B sonar:sonar -DskipTests
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonar.loyerpro.org

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: error

  # ----------------------------------------------------------------------------------
  # Frontend : build de production + tests unitaires Angular (Chrome headless).
  # ----------------------------------------------------------------------------------
  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # blame Git requis pour le Quality Gate SonarQube sur le code nouveau

      - name: Setup Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      # Gate lint/format frontend (réserve R1) : ESLint v9 + angular-eslint (config plate).
      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production
        run: npm run build -- --configuration production

      # Chrome est préinstallé sur ubuntu-latest ; le launcher NoSandbox (karma.conf.js)
      # est requis car le bac à sable Chrome n'est pas disponible sur les runners.
      # --code-coverage : génère coverage/loyertracker/lcov.info (lcovonly, karma.conf.js)
      # pour l'analyse SonarQube ci-dessous.
      - name: Tests unitaires (Chrome headless)
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --code-coverage

      # Analyse statique SonarQube — lit le lcov.info produit par l'étape de tests.
      # sonar-project.properties : clé projet, sources, exclusions, chemin lcov.
      # sonar.qualitygate.wait=true : bloquant si le gate SonarQube échoue.
      # sonarqube-scan-action exige la variable SONAR_TOKEN (nom fixe) :
      # on mappe le secret SONAR_TOKEN_FRONTEND sur ce nom attendu par l'action.
      - name: Analyse SonarQube
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          projectBaseDir: frontend/
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
          SONAR_HOST_URL: https://sonar.loyerpro.org

  # ----------------------------------------------------------------------------------
  # Sécurité : scan de secrets, analyse de composition (SCA) et scan d'image conteneur.
  # ----------------------------------------------------------------------------------
  security:
    name: Sécurité (gitleaks + SCA + Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # historique complet : gitleaks scanne aussi les commits passés

      # 1. Secrets versionnés (dépôt + historique git).
      - name: Gitleaks (scan de secrets)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. SCA agrégé — informatif (continue-on-error) : sans clé NVD, le téléchargement de
      #    la base est lent et soumis au rate-limiting. Les gates SCA *bloquants* sont portés
      #    par Trivy : `trivy fs` sur frontend/ (npm) ci-dessous, et `trivy image` sur l'API
      #    (dépendances Java de l'artefact). Fournir NVD_API_KEY (secret) rend ce job fiable.
      - name: OWASP Dependency-Check (SCA, informatif)
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c # main 2026-06-27
        with:
          project: loyertracker
          path: "."
          format: "HTML"
          args: >-
            --failOnCVSS 9
            --enableExperimental
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Publier le rapport SCA
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-check-report
          path: reports/

      # 3. SCA npm bloquant — scanne le lockfile frontend (Trivy fs), même politique de
      #    sévérité que le scan d'image. Comble la couverture npm que l'image API (Nginx +
      #    fichiers statiques, sans paquets npm dans le runtime) ne porte pas.
      - name: Trivy (scan dépendances npm)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          scanners: "vuln"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # 4. Scan de l'image conteneur de l'API (vulnérabilités OS + dépendances Java + secrets
      #    éventuellement empaquetés dans les couches — scanners vuln,secret par défaut).
      - name: Build de l'image API (pour le scan)
        run: docker build -t loyertracker-api:ci ./backend

      - name: Trivy (scan image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: loyertracker-api:ci
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # 5. Scan de l'image conteneur Web (Nginx + assets SPA) — même politique que l'API.
      #    Les deux images publiées au registry (job docker-build) sont ainsi toutes deux
      #    couvertes par le gate image avant tout push.
      - name: Build de l'image Web (pour le scan)
        run: docker build -f frontend/Dockerfile -t loyertracker-web:ci .

      - name: Trivy (scan image Web)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: loyertracker-web:ci
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  # ----------------------------------------------------------------------------------
  # Packaging + livraison : build des deux images Docker une fois la qualité validée,
  # puis push vers GHCR sur la branche principale uniquement (chaîne de livraison,
  # lot Production Readiness 1). Tags IMMUABLES `sha-<8>` (déploiement et rollback par
  # tag explicite) + alias `latest` (repère, jamais utilisé pour déployer).
  # ----------------------------------------------------------------------------------
  docker-build:
    name: Packaging Docker
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push GHCR via GITHUB_TOKEN (aucun secret supplémentaire)
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Tag court du commit
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # Image API (multi-stage Maven → JRE Alpine non-root).
      - name: Build image API
        run: docker build -t loyertracker-api:${{ steps.meta.outputs.tag }} ./backend

      # Image Web (SPA Angular buildée + Nginx reverse-proxy, contexte racine — ADR-08).
      - name: Build image Web
        run: docker build -f frontend/Dockerfile -t loyertracker-web:${{ steps.meta.outputs.tag }} .

      # Livraison : uniquement sur push de la branche principale (jamais depuis une PR,
      # dont le GITHUB_TOKEN reste en lecture seule). La qualité est déjà validée par
      # `needs` (backend + frontend + sécurité, scans Trivy des deux images inclus).
      - name: Connexion à GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push des images vers GHCR (sha + latest)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          for img in loyertracker-api loyertracker-web; do
            docker tag "$img:${{ steps.meta.outputs.tag }}" "$IMAGE_BASE/$img:${{ steps.meta.outputs.tag }}"
            docker tag "$img:${{ steps.meta.outputs.tag }}" "$IMAGE_BASE/$img:latest"
            docker push "$IMAGE_BASE/$img:${{ steps.meta.outputs.tag }}"
            docker push "$IMAGE_BASE/$img:latest"
          done
