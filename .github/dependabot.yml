version: 2
updates:
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Africa/Kinshasa
    open-pull-requests-limit: 5
    labels: [dependencies, backend]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Africa/Kinshasa
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Africa/Kinshasa
    open-pull-requests-limit: 5
    labels: [dependencies, devsecops]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Africa/Kinshasa
    open-pull-requests-limit: 3
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Africa/Kinshasa
    open-pull-requests-limit: 3
    labels: [dependencies, docker]
