name: loyertracker-staging

# Stack STAGING (lot Production Readiness 2) — mêmes services et même topologie que la stack
# de dev (point d'entrée unique Nginx TLS, ports internes non publiés — ADR-08), avec les
# différences suivantes :
#   - AUCUN build local : les images applicatives (api, nginx) sont tirées du registry GHCR,
#     publiées par la CI sur `main` (lot 1). Déploiement et rollback se font EXCLUSIVEMENT
#     par tag immuable `sha-<8>` : LOYERTRACKER_TAG est obligatoire, jamais `latest`.
#   - Limites de ressources (deploy.resources) et politiques de redémarrage explicites.
#   - L'image web embarque la SPA buildée et la conf Nginx : seuls les certificats TLS
#     (secrets, non versionnés) sont montés au runtime — lisibles par l'uid 101 (non-root).
#
# Usage (depuis la racine du dépôt, .env de staging en place) :
#   docker compose -f docker-compose.staging.yml up -d
#   LOYERTRACKER_TAG=sha-xxxxxxxx (exporté ou dans .env)
# Rollback : redéployer avec le LOYERTRACKER_TAG précédent.

services:
  postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0@sha256:f8ade94c1d0ad2f2fa7734a455fee5392764f402c43ca35e9af6bf63a2541dc9
    command: ["start", "--import-realm", "--http-relative-path=/auth"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Derrière le reverse proxy Nginx (terminaison TLS) — cf. ADR-08, identique au dev.
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-loyertracker.json:/opt/keycloak/data/import/realm-loyertracker.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # One-shot : injecte les secrets de comptes/clients (depuis .env) après l'import du realm.
  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0@sha256:f8ade94c1d0ad2f2fa7734a455fee5392764f402c43ca35e9af6bf63a2541dc9
    entrypoint: ["bash", "/opt/keycloak/data/bootstrap-test-account.sh"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_TEST_BAILLEUR_PASSWORD: ${KEYCLOAK_TEST_BAILLEUR_PASSWORD}
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
    volumes:
      - ./infra/keycloak/bootstrap-test-account.sh:/opt/keycloak/data/bootstrap-test-account.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks: [loyertracker-net]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  api:
    # Image publiée par la CI (lot 1) — tag immuable obligatoire, jamais `latest`.
    image: ${REGISTRY_BASE:-ghcr.io/jptshilombo}/loyertracker-api:${LOYERTRACKER_TAG:?Définir LOYERTRACKER_TAG=sha-xxxxxxxx (tag immuable, jamais latest)}
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      # Runtime : rôle applicatif à privilèges minimaux (RLS FORCE effective — ADR-01).
      DB_USER: ${DB_APP_USER}
      DB_PASSWORD: ${DB_APP_PASSWORD}
      DB_ADMIN_USER: ${POSTGRES_USER}
      DB_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      DB_BATCH_USER: ${DB_BATCH_USER}
      DB_BATCH_PASSWORD: ${DB_BATCH_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_API_CLIENT_ID: ${KEYCLOAK_API_CLIENT_ID}
      KEYCLOAK_API_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-https://localhost}
      APP_INVITATION_BASE_URL: ${APP_INVITATION_BASE_URL:-https://localhost}
      # Quittances certifiées (EP-14, ADR-15 D3) : secret HMAC des tokens de vérification QR.
      # À renseigner dans le .env de l'hôte AVANT le prochain déploiement (préflight Gate
      # Staging) — vide, l'API démarre avec un secret éphémère et les QR émis ne restent pas
      # vérifiables après redémarrage. L'URL de vérification vise le domaine public du QR.
      QUITTANCE_HMAC_SECRET: ${QUITTANCE_HMAC_SECRET:-}
      QUITTANCE_TOKEN_KID: ${QUITTANCE_TOKEN_KID:-1}
      QUITTANCE_VERIFY_BASE_URL: ${QUITTANCE_VERIFY_BASE_URL:-https://loyertracker.staging.loyerpro.org}
      # Notifications multicanales (EP-16, ADR-18) : socle désactivé par défaut (K8). Sprint N+1
      # (US-122/123) est le premier à nécessiter un secret Twilio Sandbox réel sur cet hôte
      # mutualisé — à renseigner dans le .env de l'hôte AVANT toute activation (même discipline
      # que QUITTANCE_HMAC_SECRET), jamais en clair dans les logs (incident set -x, Gate EP-13).
      NOTIFICATIONS_EXTERNAL_ENABLED: ${NOTIFICATIONS_EXTERNAL_ENABLED:-false}
      TWILIO_WHATSAPP_ENABLED: ${TWILIO_WHATSAPP_ENABLED:-false}
      TWILIO_SMS_ENABLED: ${TWILIO_SMS_ENABLED:-false}
      NOTIFICATION_DRY_RUN: ${NOTIFICATION_DRY_RUN:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_STATUS_CALLBACK_BASE_URL: ${TWILIO_STATUS_CALLBACK_BASE_URL:-https://loyertracker.staging.loyerpro.org}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nginx:
    # Image web publiée par la CI (SPA buildée + Nginx non-root) — même tag que l'API.
    image: ${REGISTRY_BASE:-ghcr.io/jptshilombo}/loyertracker-web:${LOYERTRACKER_TAG:?Définir LOYERTRACKER_TAG=sha-xxxxxxxx (tag immuable, jamais latest)}
    ports:
      # Remap ports privilégiés hôte → ports non privilégiés du conteneur (Nginx non-root).
      # Ports hôte paramétrables (défaut 80/443 pour un hôte dédié) : sur un hôte partagé où
      # 80/443 sont déjà pris (ex. reverse proxy mutualisé), surcharger via .env —
      # WEB_HTTP_PORT / WEB_HTTPS_PORT (lot Production Readiness 4b).
      - "${WEB_HTTP_PORT:-80}:8080"
      - "${WEB_HTTPS_PORT:-443}:8443"
    volumes:
      # Seuls les certificats sont montés (lisibles par l'uid 101) ; conf et SPA sont dans l'image.
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_started
    networks: [loyertracker-net]
    healthcheck:
      # Sonde la vivacité Nginx via /healthz (200, port HTTP interne) — cf. nginx.conf.
      # 127.0.0.1 (et non localhost) : Nginx n'écoute qu'en IPv4 (`listen 8080;`) ; or sur
      # certains hôtes /etc/hosts résout localhost en ::1 d'abord et le wget busybox (alpine)
      # tente l'IPv6 → connection refused. L'IPv4 loopback explicite est déterministe.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

networks:
  loyertracker-net:
    driver: bridge

volumes:
  postgres-data:
