spring:
  application:
    name: loyertracker-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    # Le schéma est la propriété de Flyway (source de vérité SQL) ; Hibernate ne fait que valider
    # la correspondance entité↔table au démarrage, jamais de DDL automatique.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS récupéré en interne (atteignable depuis le conteneur api), tandis que le
          # claim `iss` est validé contre l'URL publique (terminaison TLS par Nginx, ADR-08).
          # Sans cette dissociation, l'api tenterait de joindre https://localhost (= elle-même).
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

server:
  port: 8080
  # Respecte les en-têtes X-Forwarded-* posés par Nginx (scheme/host corrects).
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      # Exposé derrière Nginx sous /api/ : la santé est donc à /api/actuator/health.
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    # Alimente /api/actuator/info (env actif) — utile pour identifier la version déployée.
    env:
      enabled: true

# Observabilité (Étape 09). Journalisation structurée JSON (ECS) native Spring Boot 3.5 :
# logs émis sur stdout (12-factor), parsables par un agrégateur, cohérents avec l'access log
# JSON de Nginx. Aucune dépendance ajoutée. Surchargeable en dev pour un format texte via
# l'option `--logging.structured.format.console=` (vide).
# ⚠️ ENF-03 — ne JAMAIS journaliser de PII (mots de passe, tokens, noms/emails de locataires) :
#   ✅ id d'entité, action, bailleurId, horodatage   ❌ secrets, identité du locataire.
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.loyertracker: INFO            # élever à DEBUG en dev via LOGGING_LEVEL_COM_LOYERTRACKER=DEBUG
    org.springframework.security: INFO

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:https://localhost}
