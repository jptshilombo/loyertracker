spring:
  application:
    name: loyertracker-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    # Le schéma est la propriété de Flyway (source de vérité SQL) ; Hibernate ne fait que valider
    # la correspondance entité↔table au démarrage, jamais de DDL automatique.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    # Flyway migre via un rôle ADMINISTRATEUR (propriétaire du schéma), distinct du rôle runtime
    # à privilèges minimaux (spring.datasource ci-dessus = loyertracker_api en prod). Il faut le DDL
    # et la création de rôle (V5), tout en gardant l'application sous RLS FORCE. DB_ADMIN_* doit être
    # fourni en prod ; repli sur le datasource sinon (échec explicite si ce rôle n'a pas les droits).
    user: ${DB_ADMIN_USER:${DB_USER}}
    password: ${DB_ADMIN_PASSWORD:${DB_PASSWORD}}
    placeholders:
      # Mot de passe du rôle loyertracker_api créé en V5 — DOIT égaler spring.datasource.password.
      api_password: ${DB_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS récupéré en interne (atteignable depuis le conteneur api), tandis que le
          # claim `iss` est validé contre l'URL publique (terminaison TLS par Nginx, ADR-08).
          # Sans cette dissociation, l'api tenterait de joindre https://localhost (= elle-même).
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

server:
  port: 8080
  # Respecte les en-têtes X-Forwarded-* posés par Nginx (scheme/host corrects).
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      # Exposé derrière Nginx sous /api/ : la santé est donc à /api/actuator/health.
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    # Alimente /api/actuator/info (env actif) — utile pour identifier la version déployée.
    env:
      enabled: true

# Observabilité (Étape 09). Journalisation structurée JSON (ECS) native Spring Boot 3.5 :
# logs émis sur stdout (12-factor), parsables par un agrégateur, cohérents avec l'access log
# JSON de Nginx. Aucune dépendance ajoutée. Surchargeable en dev pour un format texte via
# l'option `--logging.structured.format.console=` (vide).
# ⚠️ ENF-03 — ne JAMAIS journaliser de PII (mots de passe, tokens, noms/emails de locataires) :
#   ✅ id d'entité, action, bailleurId, horodatage   ❌ secrets, identité du locataire.
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.loyertracker: INFO            # élever à DEBUG en dev via LOGGING_LEVEL_COM_LOYERTRACKER=DEBUG
    org.springframework.security: INFO

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:https://localhost}
  invitation:
    # Base du lien d'acceptation transmis au gestionnaire (US-11). Front Angular derrière Nginx.
    base-url: ${APP_INVITATION_BASE_URL:https://localhost}
  alertes:
    preavis:
      # Bande de préavis (US-50, EF-62) : un bail ACTIF dont le terme est à ≤ N jours (et > 60 j,
      # au-delà de FIN_BAIL) déclenche une alerte PREAVIS. Arbitrage PO : 3 mois = 90 jours.
      jours: ${APP_ALERTES_PREAVIS_JOURS:90}

# Admin API Keycloak — création de compte gestionnaire (US-12, ADR-10, R6). Client confidentiel
# dédié `loyertracker-admin` (service account, distinct du resource-server bearer-only
# `loyertracker-api`), portant les rôles realm-management manage-users/view-users/view-realm.
# base-url inclut le chemin relatif /auth (KC démarré avec --http-relative-path=/auth).
# Secret hors dépôt (ENF-03), fourni par variable d'environnement.
keycloak:
  admin:
    base-url: ${KEYCLOAK_ADMIN_BASE_URL:http://keycloak:8080/auth}
    realm: ${KEYCLOAK_REALM:loyertracker}
    client-id: ${KEYCLOAK_API_CLIENT_ID:loyertracker-admin}
    client-secret: ${KEYCLOAK_API_CLIENT_SECRET:}
