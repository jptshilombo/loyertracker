# Config commune aux tests d'intégration Spring (@SpringBootTest).
# Les @DynamicPropertySource de chaque test fixent l'URL du datasource (conteneur Testcontainers).
#
# DOUBLE DATASOURCE (fidélité RLS, ADR-01) :
#  - Datasource APPLICATIF (primaire) = rôle restreint loyertracker_api (NOSUPERUSER NOBYPASSRLS) :
#    l'application sert JPA sous ce rôle, donc la RLS FORCE est réellement exercée sur le chemin
#    applicatif, comme en production. Les identifiants sont statiques ici (seule l'URL est dynamique) ;
#    le mot de passe DOIT égaler le placeholder api_password (rôle créé en V5).
#  - FLYWAY migre via le superutilisateur du conteneur (= admin, seul capable de CREATE ROLE en V5),
#    AVANT que le pool applicatif ne se connecte (ordre garanti : Flyway -> EMF Hibernate -> 1re
#    connexion loyertracker_api, identique à la prod).
#  - Le harnais de test (TRUNCATE/seed) passe par un JdbcTemplate admin séparé
#    (cf. RlsTestDataSourceConfig), car loyertracker_api n'a pas le droit de TRUNCATE / d'écrire hors
#    de son tenant.
spring.datasource.username=loyertracker_api
spring.datasource.password=loyertracker_api_test
spring.flyway.user=test
spring.flyway.password=test
spring.flyway.placeholders.api_password=loyertracker_api_test
