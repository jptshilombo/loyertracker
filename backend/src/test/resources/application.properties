# Config commune aux tests d'intégration Spring (@SpringBootTest).
# Les @DynamicPropertySource de chaque test fixent l'URL + les identifiants du datasource
# (superutilisateur Testcontainers). Ici on complète le strict nécessaire pour la migration V5 :
#
#  - spring.flyway.user/password : Flyway migre via le superutilisateur du conteneur (= admin,
#    capable de CREATE ROLE en V5). Identifiants par défaut fixes de PostgreSQLContainer.
#  - spring.flyway.placeholders.api_password : valeur du mot de passe du rôle loyertracker_api
#    créé en V5 (placeholder obligatoire, sinon la migration échoue). Valeur de test sans portée
#    sécurité : le datasource des tests reste le superutilisateur, pas loyertracker_api.
spring.flyway.user=test
spring.flyway.password=test
spring.flyway.placeholders.api_password=loyertracker_api_test
